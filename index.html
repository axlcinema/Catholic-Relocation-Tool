<style>
:root{--bg:#0f1117;--card:#181b24;--gold:#c9a96e;--gd:rgba(201,169,110,0.2);--t:#e8e4dc;--td:rgba(232,228,220,0.55);--bd:rgba(201,169,110,0.12);--g:#6abf7b;--gb:#4a8c5c;--am:#d4a843;--r:#cf6b6b;--rb:#8b3a3a;--hf:'Playfair Display',Georgia,serif;--bf:'Source Sans 3','Segoe UI',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t);font-family:var(--bf);min-height:100dvh;overflow-x:hidden}
button{font-family:var(--bf);-webkit-appearance:none}
.page{padding:24px 14px;max-width:900px;margin:0 auto}
.page.pb{padding-bottom:90px}
h2{font-family:var(--hf);color:var(--gold);font-size:22px;margin-bottom:4px}
.sub{color:var(--td);font-size:13px}
.card{background:var(--card);border-radius:10px;padding:12px 14px;border:1px solid var(--bd);margin-bottom:6px}
.row{display:flex;align-items:center;gap:10px}
.flex1{flex:1;min-width:0}
.fname{font-weight:600;font-size:13px;margin-bottom:1px}
.fdesc{color:var(--td);font-size:11px}
.stars{display:flex;gap:2px;flex-shrink:0}
.star{background:none;border:none;font-size:20px;padding:2px;cursor:pointer;color:rgba(255,255,255,0.1);line-height:1}
.star.on{color:var(--gold)}
.star.off{color:rgba(255,255,255,0.05)!important}
.skip-btn{background:transparent;border:1px solid var(--bd);color:var(--td);font-size:9px;font-weight:700;padding:4px 8px;border-radius:4px;cursor:pointer;letter-spacing:0.5px;white-space:nowrap;margin-left:4px}
.skip-btn.on{background:var(--rb);border-color:var(--r);color:#fff}
.must-btn{background:transparent;border:1px solid var(--bd);color:var(--td);font-size:9px;font-weight:700;padding:4px 8px;border-radius:4px;cursor:pointer;letter-spacing:0.5px;white-space:nowrap;margin-left:4px}
.must-btn.on{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.warn{background:rgba(212,168,67,0.12);border-left:3px solid var(--am);color:#e6d5a5;font-size:11.5px;line-height:1.5;padding:8px 10px;border-radius:6px;margin:10px 0 4px}
.cc.fail{opacity:0.6;border-color:var(--rb)}
.fail-txt{color:var(--r);font-size:10px;font-weight:600;margin-top:2px}
.skipped .fname,.skipped .fdesc{opacity:0.35;text-decoration:line-through}
.bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bd);padding:10px 14px;display:flex;gap:8px;justify-content:center;z-index:100;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.btn{background:linear-gradient(135deg,var(--gold),#a8863a);color:var(--bg);border:none;padding:12px 36px;border-radius:8px;font-family:var(--hf);font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(201,169,110,0.3)}
.btn:active{transform:scale(0.97)}
.btn-o{background:transparent;color:var(--gold);border:1px solid var(--gold);padding:10px 24px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px}
.btn-o:active{background:var(--gd)}
.btn-s{background:transparent;color:var(--td);border:1px solid var(--bd);padding:5px 12px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer}
.btn-s.on{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tag{background:var(--gd);color:var(--gold);padding:5px 12px;border-radius:18px;font-size:11px;font-weight:600}
.intro{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:32px 20px;text-align:center}
.intro h1{font-family:var(--hf);font-size:28px;font-weight:700;color:var(--gold);line-height:1.2;margin:12px 0}
.intro p{color:var(--td);font-size:14px;line-height:1.6;max-width:420px;margin:0 auto 24px}
.sect{margin-bottom:20px}
.sect-title{font-family:var(--hf);color:var(--gold);font-size:15px;margin-bottom:8px}
.sel-wrap{position:relative}
.sel{background:var(--card);color:var(--t);border:1px solid var(--bd);border-radius:8px;padding:12px 40px 12px 14px;font-size:14px;font-family:var(--bf);width:100%;-webkit-appearance:none;appearance:none;cursor:pointer}
.sel-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:12px;pointer-events:none}
.cc{background:var(--card);border-radius:12px;border:1px solid var(--bd);margin-bottom:6px;overflow:hidden;transition:border-color 0.2s}
.cc.top{border-color:var(--gold);box-shadow:0 0 14px var(--gd)}
.cc-main{padding:11px 12px;display:flex;align-items:center;gap:7px;cursor:pointer}
.cc-rank{font-size:11px;font-weight:700;color:var(--td);min-width:26px;text-align:center}
.cc-flag{font-size:22px}
.cc-name{font-weight:700;font-size:14px;font-family:var(--hf)}
.cc-reg{font-size:10px;color:var(--td)}
.cc-sc{text-align:right}
.cc-num{font-size:20px;font-weight:700;font-family:var(--hf)}
.cc-max{font-size:9px;color:var(--td)}
.cc-act{display:flex;align-items:center;gap:5px}
.cc-cmp{background:transparent;color:var(--td);border:1px solid var(--bd);border-radius:5px;padding:3px 7px;font-size:10px;cursor:pointer;font-weight:600}
.cc-cmp.on{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.arr{color:var(--td);font-size:11px;transition:transform 0.2s;padding:2px}
.arr.open{transform:rotate(180deg)}
.detail{padding:0 12px 14px;border-top:1px solid var(--bd)}
.notes{color:var(--td);font-size:12px;line-height:1.6;margin:10px 0}
.sgrid{display:grid;grid-template-columns:1fr;gap:3px}
@media(min-width:480px){.sgrid{grid-template-columns:1fr 1fr}}
.sbar-bg{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;flex:1}
.sbar-f{height:100%;border-radius:3px;transition:width 0.4s}
.sbar-w{display:flex;align-items:center;gap:5px}
.sbar-v{font-size:10px;font-weight:700;min-width:14px;text-align:right}
.slbl{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--td);margin-bottom:2px}
.info-btn{background:none;border:none;font-size:10px;cursor:pointer;padding:0 3px;opacity:0.5;transition:opacity 0.2s}
.info-btn:hover,.info-btn.open{opacity:1}
.info-text{font-size:11px;color:var(--td);line-height:1.5;padding:4px 8px;margin:2px 0 4px;background:rgba(255,255,255,0.03);border-radius:6px;border-left:2px solid var(--gold)}
.cmp-panel{background:var(--card);border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid var(--gold);overflow-x:auto;-webkit-overflow-scrolling:touch}
.cmp-panel h3{font-family:var(--hf);color:var(--gold);font-size:15px;margin-bottom:10px}
.ctbl{width:100%;border-collapse:collapse;font-size:11px;min-width:360px}
.ctbl th,.ctbl td{padding:4px 5px;border-bottom:1px solid var(--bd)}
.ctbl th{text-align:center;font-weight:700;font-size:11px}
.ctbl th:first-child{text-align:left;font-weight:400;color:var(--td)}
.ctbl td:first-child{color:var(--td);font-size:10px}
.ctbl td{text-align:center}
.best{font-weight:700;color:var(--g)}
.low{color:var(--r)}
.footer{text-align:center;margin-top:32px;padding:18px 0;border-top:1px solid var(--bd)}
.footer p{color:var(--td);font-size:10px;line-height:1.6}
.dta-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;margin-top:2px}
.dta-y{background:rgba(106,191,123,0.15);color:var(--g)}
.dta-n{background:rgba(207,107,107,0.12);color:var(--r)}
.climate-opt{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(min-width:500px){.climate-opt{grid-template-columns:1fr 1fr 1fr}}
.cl-btn{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:10px 8px;cursor:pointer;text-align:center;transition:all 0.2s;color:var(--t);position:relative}
.cl-btn.on{border-color:var(--gold);background:var(--gd)}
.cl-btn .ico{font-size:20px;margin-bottom:3px}
.cl-btn .lbl{font-size:11px;font-weight:600}
.cl-btn .ck{position:absolute;top:5px;right:7px;font-size:11px;color:var(--gold);display:none}
.cl-btn.on .ck{display:block}
.cl-hint{color:var(--td);font-size:11px;margin-top:6px;text-align:center;font-style:italic}
.sc-btns{display:flex;gap:6px;flex-wrap:wrap}
.sc-btn{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;cursor:pointer;text-align:center;flex:1;min-width:90px;transition:all 0.2s;color:var(--t)}
.sc-btn.on{border-color:var(--gold);background:var(--gd)}
.sc-btn .ico{font-size:18px;margin-bottom:3px}
.sc-btn .lbl{font-size:11px;font-weight:600}
.step-dots{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15)}
.dot.on{background:var(--gold)}
.count-bar{background:var(--card);border-radius:8px;padding:7px 12px;margin-bottom:10px;font-size:11px;color:var(--td);display:flex;justify-content:space-between;align-items:center}
</style>

{id:"peru",n:"Peru",f:"🇵🇪",r:"Americas",s:[7,5,7,9,8,5,4,4,5,3,5,5,7,6,7,4,3],cl:{med:4,four:3,trop:7,cool:2,alp:8,dry:6},nt:"~74% Catholic. Andes. Cheap outside Lima. Lima food world-class. Limited TLM."},
{id:"guatemala",n:"Guatemala",f:"🇬🇹",r:"Americas",s:[8,5,7,7,9,6,3,3,4,7,4,4,5,6,6,4,2],cl:{med:4,four:2,trop:8,cool:2,alp:3,dry:2},nt:"Constitutional gun right. ~45% Catholic. Very cheap. Safety concern. Lake Atitlan."},
{id:"domrep",n:"Dominican Rep.",f:"🇩🇴",r:"Americas",s:[7,4,6,5,8,6,4,4,4,3,4,5,6,7,6,4,1],cl:{med:2,four:1,trop:10,cool:1,alp:1,dry:3},nt:"~48% Catholic. Cheap. $200k investor visa. Hurricane risk. No TLM."},
{id:"belize",n:"Belize",f:"🇧🇿",r:"Americas",s:[5,5,7,6,7,7,4,9,4,5,4,4,5,7,7,5,1],cl:{med:2,four:1,trop:9,cool:1,alp:1,dry:2},nt:"English-speaking! ~40% Catholic. Caribbean/jungle. Cheap. Guns legal (9mm max). QRP residency."},
];

const REGS=["All","EU","Europe","Eurasia","Middle East","Asia","Americas"];
// Citizenship-based residency overrides: your passport can make residency trivial
// (EU freedom of movement, UK-Ireland Common Travel Area, home country).
const euAll={};C.filter(c=>c.r==="EU").forEach(c=>{euAll[c.id]=10});
const CIT={"USA":{usa:10},"UK":{ireland:10,uk:10},"Ireland":{...euAll,switzerland:8,uk:10},"Canada":{},"Australia":{},"South Africa":{},"Germany":{...euAll,switzerland:8}};
const LS="crt-state-v1";
const SAVED=(()=>{try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return{}}})();

function App(){
const[step,setStep]=useState("intro");
const[wt,setWt]=useState(()=>{const w={};F.forEach(f=>{w[f.id]=(SAVED.wt&&SAVED.wt[f.id])||3});return w});
const[skip,setSkip]=useState(()=>{const s={};F.forEach(f=>{s[f.id]=!!(SAVED.skip&&SAVED.skip[f.id])});return s});
const[db,setDb]=useState(()=>{const s={};F.forEach(f=>{s[f.id]=!!(SAVED.db&&SAVED.db[f.id])});return s});
const[cpSet,setCpSet]=useState(()=>new Set(SAVED.cp||["med"]));
const[cwt,setCwt]=useState(SAVED.cwt||3);
const[scn,setScn]=useState(SAVED.scn||null);
const[hi,setHi]=useState(SAVED.hi||0);
const[rf,setRf]=useState("All");
const[ex,setEx]=useState(null);
const[cList,setCList]=useState([]);
const[sCmp,setSCmp]=useState(false);
const[infoOpen,setInfoOpen]=useState(null);

useEffect(()=>{try{localStorage.setItem(LS,JSON.stringify({wt,skip,db,cp:[...cpSet],cwt,scn,hi}))}catch(e){}},[wt,skip,db,cpSet,cwt,scn,hi]);

const toggleClimate=(id)=>{setCpSet(prev=>{const n=new Set(prev);if(n.has(id))n.delete(id);else n.add(id);return n})};
const applySc=(sid)=>{const s=SC.find(x=>x.id===sid);if(!s)return;setScn(sid);const nw={};F.forEach(f=>{nw[f.id]=3});Object.entries(s.b).forEach(([k,v])=>{if(nw[k]!==undefined)nw[k]=Math.min(5,nw[k]+v)});setWt(nw);setSkip(prev=>{const ns={...prev};F.forEach(f=>{ns[f.id]=false});return ns})};

const czOv=CIT[HC[hi]]||{};
const effS=(c)=>{const o=czOv[c.id];if(o!==undefined&&o>c.s[13]){const s2=c.s.slice();s2[13]=o;return s2}return c.s};

const ranked=useMemo(()=>{
const cpArr=[...cpSet];
return C.map(c=>{
const s=effS(c);
let tw=0,ws=0;
F.forEach((f,i)=>{if(skip[f.id])return;const w=wt[f.id]||0;ws+=w*(s[i]||0);tw+=w});
if(cpArr.length>0){const avg=cpArr.reduce((a,k)=>a+(c.cl[k]||0),0)/cpArr.length;ws+=cwt*avg;tw+=cwt}
const fails=F.map((f,i)=>db[f.id]&&!skip[f.id]&&(s[i]||0)<5?{n:f.n,v:s[i]||0}:null).filter(Boolean);
const edge=F.map((f,i)=>db[f.id]&&!skip[f.id]&&(s[i]||0)>=5&&(s[i]||0)<=6?{n:f.n,v:s[i]||0}:null).filter(Boolean);
return{...c,es:s,fails,edge,fs:tw>0?Math.round((ws/tw)*10)/10:0};
}).filter(c=>rf==="All"||c.r===rf)
.sort((a,b)=>((a.fails.length>0)-(b.fails.length>0))||b.fs-a.fs);
},[wt,skip,db,cpSet,cwt,rf,hi]);

const tCmp=(id)=>setCList(p=>p.includes(id)?p.filter(x=>x!==id):p.length<4?[...p,id]:p);
const cmpd=C.filter(c=>cList.includes(c.id));
const sco=(s)=>s>=7?"var(--g)":s>=5.5?"var(--gold)":"var(--r)";
const bco=(s)=>s>=8?"var(--gb)":s>=6?"var(--gold)":s>=4?"var(--am)":"var(--rb)";
const bte=(s)=>s>=8?"var(--g)":s>=6?"#dcc07a":s>=4?"var(--am)":"var(--r)";
const cpArr=[...cpSet];
const climLabel=cpArr.map(id=>CL.find(x=>x.id===id)).filter(Boolean).map(x=>x.ico+" "+x.n).join(" + ");

if(step==="intro")return(
<div className="intro">
<div style={{fontSize:48}}>✝️</div>
<h1>Catholic Family<br/>Relocation Assessment</h1>
<p>A weighted decision tool for freedom-loving Catholic families seeking a permanent home. Choose your climate, rate priorities, then compare {C.length} countries.</p>
<div className="chips" style={{justifyContent:"center",marginBottom:24}}>
{[C.length+" Countries","17 Criteria","MUST Dealbreakers","Citizenship-aware","6 Climates","Compare"].map(t=><span key={t} className="tag">{t}</span>)}
</div>
<button className="btn" onClick={()=>setStep("setup")}>Begin Assessment</button>
<p style={{color:"var(--td)",fontSize:11,marginTop:20}}>Data compiled Feb 2026 · corrections Jul 2026 · always verify independently</p>
</div>);

if(step==="setup")return(
<div className="page pb">
<div className="step-dots">{[1,2,3].map(i=><div key={i} className={`dot ${i===1?"on":""}`}/>)}</div>
<h2>Setup</h2><p className="sub" style={{marginBottom:20}}>Configure your situation before rating priorities.</p>
<div className="sect"><div className="sect-title">👤 Your Situation</div>
<div className="sc-btns">{SC.map(s=><button key={s.id} className={`sc-btn ${scn===s.id?"on":""}`} onClick={()=>applySc(s.id)}><div className="ico">{s.ico}</div><div className="lbl">{s.n}</div></button>)}</div>
<p style={{color:"var(--td)",fontSize:11,marginTop:6}}>Pre-adjusts weights. Fine-tune next.</p></div>
<div className="sect"><div className="sect-title">🌤️ Preferred Climate</div>
<div className="climate-opt">{CL.map(c=><button key={c.id} className={`cl-btn ${cpSet.has(c.id)?"on":""}`} onClick={()=>toggleClimate(c.id)}><span className="ck">✓</span><div className="ico">{c.ico}</div><div className="lbl">{c.n}</div></button>)}</div>
<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:10}}>
<span style={{fontSize:11,color:"var(--td)"}}>Climate importance:</span>
<div className="stars">{[1,2,3,4,5].map(s=><button key={s} className={`star ${cpSet.size>0&&s<=cwt?"on":""} ${cpSet.size===0?"off":""}`} onClick={()=>{if(cpSet.size>0)setCwt(s)}}>★</button>)}</div>
</div>
<p className="cl-hint">Select one or more — or deselect all to ignore climate entirely.</p></div>
<div className="sect"><div className="sect-title">🛂 Citizenship / Home Country</div>
<div className="sel-wrap"><select className="sel" value={hi} onChange={e=>setHi(Number(e.target.value))}>{HC.map((h,i)=><option key={h} value={i}>{h}</option>)}</select><span className="sel-arrow">▼</span></div>
<p style={{color:"var(--td)",fontSize:11,marginTop:6}}>Used for double-taxation treaty badges AND to adjust Residency Pathway scores to your passport (EU freedom of movement, UK↔Ireland Common Travel Area, home country).</p></div>
<div className="bar"><button className="btn-o" onClick={()=>setStep("intro")}>Back</button><button className="btn" onClick={()=>setStep("weight")}>Rate Priorities →</button></div>
</div>);

if(step==="weight")return(
<div className="page pb">
<div className="step-dots">{[1,2,3].map(i=><div key={i} className={`dot ${i===2?"on":""}`}/>)}</div>
<h2>Rate Your Priorities</h2><p className="sub" style={{marginBottom:16}}>1★ = nice to have · 5★ = top priority · MUST = dealbreaker: under 5/10 fails, 5–6/10 marked borderline · SKIP = exclude from scoring</p>
{F.map(f=><div key={f.id} className={`card row ${skip[f.id]?"skipped":""}`}><div className="flex1"><div className="fname">{f.n}{db[f.id]&&!skip[f.id]?" 🚫":""}</div><div className="fdesc">{f.d}</div></div><div className="stars">{[1,2,3,4,5].map(s=><button key={s} className={`star ${!skip[f.id]&&s<=wt[f.id]?"on":""} ${skip[f.id]?"off":""}`} onClick={()=>{if(!skip[f.id])setWt(p=>({...p,[f.id]:s}))}}>★</button>)}</div><div style={{display:"flex",flexDirection:"column",gap:3}}><button className={`skip-btn ${skip[f.id]?"on":""}`} onClick={()=>{setSkip(p=>({...p,[f.id]:!p[f.id]}));setDb(p=>({...p,[f.id]:false}))}}>{skip[f.id]?"SKIPPED":"SKIP"}</button><button className={`must-btn ${db[f.id]?"on":""}`} onClick={()=>{setDb(p=>({...p,[f.id]:!p[f.id]}));setSkip(p=>({...p,[f.id]:false}))}}>{db[f.id]?"MUST ✓":"MUST"}</button></div></div>)}
<div className="bar"><button className="btn-o" onClick={()=>setStep("setup")}>Back</button><button className="btn" onClick={()=>setStep("results")}>See Results →</button></div>
</div>);

const totalC=C.length;
const shownC=ranked.length;
return(
<div className="page" style={{paddingBottom:40}}>
<div className="step-dots">{[1,2,3].map(i=><div key={i} className={`dot ${i===3?"on":""}`}/>)}</div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:12,flexWrap:"wrap",gap:8}}>
<div><h2>Your Rankings</h2><p className="sub">Tap for details.</p></div>
<div style={{display:"flex",gap:6}}><button className="btn-o" style={{padding:"6px 12px",fontSize:12}} onClick={()=>setStep("weight")}>✏️ Edit</button><button className="btn-o" style={{padding:"6px 12px",fontSize:12}} onClick={()=>setStep("setup")}>⚙️ Setup</button></div>
</div>
<div className="chips">
{REGS.map(r=><button key={r} className={`btn-s ${rf===r?"on":""}`} onClick={()=>setRf(r)}>{r}</button>)}
{cList.length>=2&&<button className="btn-s on" onClick={()=>setSCmp(!sCmp)}>{sCmp?"Hide":"Compare"} ({cList.length})</button>}
</div>
<div className="count-bar">
<span>Showing <strong style={{color:"var(--gold)"}}>{shownC}</strong> of {totalC} countries{ranked.filter(c=>c.fails.length>0).length>0?<span style={{color:"var(--r)"}}> · {ranked.filter(c=>c.fails.length>0).length} fail your MUSTs</span>:null}</span>
<span style={{fontSize:10}}>{cpArr.length>0?climLabel:"No climate pref"} · 🛂 {HC[hi]} · {SC.find(x=>x.id===scn)?.ico||"👤"} {SC.find(x=>x.id===scn)?.n||"Custom"}</span>
</div>

{sCmp&&cmpd.length>=2&&(
<div className="cmp-panel"><h3>Side-by-Side</h3>
<table className="ctbl"><thead><tr><th>Factor</th>{cmpd.map(c=><th key={c.id}>{c.f} {c.n}</th>)}</tr></thead><tbody>
{F.filter(f=>!skip[f.id]).map(f=>{const fi=F.indexOf(f);const vs=cmpd.map(c=>effS(c)[fi]||0);const b=Math.max(...vs);
return<tr key={f.id}><td>{f.n}{db[f.id]?" 🚫":""}</td>{cmpd.map((c,i)=>{const v=vs[i];return<td key={c.id} className={v===b?"best":v>=6?"":"low"}>{v}/10</td>})}</tr>})
}
{cpArr.length>0&&<tr><td>Climate</td>{cmpd.map(c=>{const avg=Math.round(cpArr.reduce((a,k)=>a+(c.cl[k]||0),0)/cpArr.length*10)/10;const best=Math.max(...cmpd.map(x=>Math.round(cpArr.reduce((a,k)=>a+(x.cl[k]||0),0)/cpArr.length*10)/10));return<td key={c.id} className={avg===best?"best":avg>=6?"":"low"}>{avg}/10</td>})}</tr>}
<tr><td>DTA {HC[hi]}</td>{cmpd.map(c=>{const d=DT[c.id];const h=d?d[hi]:false;return<td key={c.id}><span className={`dta-badge ${h?"dta-y":"dta-n"}`}>{h?"✓":"✗"}</span></td>})}</tr>
</tbody></table></div>)}

{ranked.map((c,i)=>{
const op=ex===c.id;const rr=i+1;
const failed=c.fails.length>0;
const md=!failed&&rr===1?"🥇":!failed&&rr===2?"🥈":!failed&&rr===3?"🥉":null;
const dt=DT[c.id];const hd=dt?dt[hi]:false;
const climAvg=cpArr.length>0?Math.round(cpArr.reduce((a,k)=>a+(c.cl[k]||0),0)/cpArr.length*10)/10:0;
const rOv=c.es[13]!==c.s[13];
return(
<div key={c.id} className={`cc ${!failed&&rr<=3?"top":""} ${failed?"fail":""}`}>
<div className="cc-main" onClick={()=>setEx(op?null:c.id)}>
<div className="cc-rank" style={failed?{color:"var(--r)"}:null}>{failed?"✗":md||`#${rr}`}</div>
<div className="cc-flag">{c.f}</div>
<div className="flex1"><div className="cc-name">{c.n}{c.w?<span style={{fontSize:11,marginLeft:4}} title="Important caveat — tap to expand">⚠️</span>:null}</div><div className="cc-reg">{c.r}{hd?<span className="dta-badge dta-y" style={{marginLeft:5}}>DTA</span>:null}</div>
{failed&&<div className="fail-txt">Fails: {c.fails.map(x=>`${x.n} (${x.v}/10)`).join(", ")}</div>}
{!failed&&c.edge.length>0&&<div className="fail-txt" style={{color:"var(--am)"}}>Borderline: {c.edge.map(x=>`${x.n} (${x.v}/10)`).join(", ")} — verify closely</div>}
</div>
<div className="cc-sc"><div className="cc-num" style={{color:failed?"var(--r)":sco(c.fs)}}>{c.fs}</div><div className="cc-max">/ 10</div></div>
<div className="cc-act"><button className={`cc-cmp ${cList.includes(c.id)?"on":""}`} onClick={e=>{e.stopPropagation();tCmp(c.id)}}>{cList.includes(c.id)?"✓":"+"}</button><span className={`arr ${op?"open":""}`}>▼</span></div>
</div>
{op&&(<div className="detail">
{c.w&&<div className="warn">⚠️ {c.w}</div>}
<p className="notes">{c.nt}</p>
<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
<span className={`dta-badge ${hd?"dta-y":"dta-n"}`}>DTA w/ {HC[hi]}: {hd?"Yes":"No"}</span>
{rOv&&<span className="dta-badge dta-y">🛂 Residency adjusted for {HC[hi]} passport</span>}
{cpArr.length>0&&<span className="dta-badge" style={{background:"var(--gd)",color:"var(--gold)"}}>Climate avg: {climAvg}/10</span>}
</div>
<div style={{marginBottom:8}}><div style={{fontSize:10,color:"var(--td)",marginBottom:4,fontWeight:600}}>Climate Profile</div>
<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{CL.map(cl2=><span key={cl2.id} style={{padding:"2px 7px",borderRadius:10,fontSize:9,fontWeight:600,background:cpSet.has(cl2.id)?"var(--gd)":"rgba(255,255,255,0.04)",color:cpSet.has(cl2.id)?"var(--gold)":"var(--td)",border:cpSet.has(cl2.id)?"1px solid var(--gold)":"1px solid transparent"}}>{cl2.ico} {c.cl[cl2.id]}/10</span>)}</div></div>
<div className="sgrid">{F.map((f,fi)=>{if(skip[f.id])return null;const infoKey=`${c.id}-${f.id}`;const ctx=CTX[c.id]?.[f.id]||"";const isOpen=infoOpen===infoKey;const v=c.es[fi]||0;return<div key={f.id} style={{padding:"3px 0"}}><div className="slbl"><span>{f.n}{db[f.id]?" 🚫":""}</span><span style={{display:"flex",alignItems:"center",gap:"4px"}}><span>{"★".repeat(wt[f.id])}</span>{ctx&&<button className={`info-btn ${isOpen?"open":""}`} onClick={()=>setInfoOpen(isOpen?null:infoKey)}>ℹ️</button>}</span></div>{isOpen&&ctx&&<div className="info-text">{ctx}</div>}<div className="sbar-w"><div className="sbar-bg"><div className="sbar-f" style={{width:`${v*10}%`,background:bco(v)}}/></div><span className="sbar-v" style={{color:bte(v)}}>{v}</span></div></div>})}</div>
<p style={{color:"var(--td)",fontSize:10,fontStyle:"italic",marginTop:8,lineHeight:1.5}}>Laws change, and administrative practice can differ from what statutes say. Verify homeschool registration, vaccine and visa rules with official sources before acting on this.</p>
</div>)}
</div>)})
}

<div className="footer">
<p>Heritage Economic Freedom Index 2025 · Fraser Human Freedom Index 2025 · Global Peace Index · HSLDA · Small Arms Survey · Numbeo · IRS/HMRC/Revenue DTA lists</p>
<button className="btn-o" style={{marginTop:10}} onClick={()=>{try{localStorage.removeItem(LS)}catch(e){};location.reload()}}>Start Over</button>
</div>
</div>);
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
